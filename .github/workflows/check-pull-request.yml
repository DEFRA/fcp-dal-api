name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history including all tags, needed to find the highest existing version tag
          fetch-depth: 0

      - name: Setup npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18
          cache: npm

      - name: Install and audit
        run: |
          npm audit --omit=dev
          npm ci --ignore-scripts
          npm run postinstall

      - name: Verify semantic version bump
        run: |
          # Use the highest existing repo-wide tag rather than main's package.json version, since hotfix branches can tag a version higher than the latest main version
          TARGET_VERSION=$(git tag -l | xargs npx -y semver | tail -n1)
          PR_BRANCH_VERSION=$(jq -r '.version' package.json)

          if ! npx -y semver -r ">${TARGET_VERSION}" "${PR_BRANCH_VERSION}" > /dev/null  ; then
            echo "ERROR: Branch package.json version (${PR_BRANCH_VERSION}) must be semantically greater than the highest existing repository tag (${TARGET_VERSION})"
            exit 1
          fi

      - name: Lint code
        run: npm run lint

      - name: Download base coverage snapshot from main
        id: base-cov
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p base-coverage
          RUN_ID=$(gh run list --workflow=publish.yml --branch=main --status=success --limit=1 --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" -n coverage-report-main -D base-coverage || true
          fi
          if [ -f base-coverage/report.json ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Jest Coverage Comment (with base snapshot)
        if: steps.base-cov.outputs.available == 'true'
        uses: ArtiomTr/jest-coverage-report-action@v2
        # NOTE: need to switch to vitest!
        with:
          test-script: npm test
          base-coverage-file: base-coverage/report.json

      - name: Jest Coverage Comment (no base snapshot)
        if: steps.base-cov.outputs.available != 'true'
        uses: ArtiomTr/jest-coverage-report-action@v2
        # NOTE: need to switch to vitest!
        with:
          test-script: npm test

      - name: Acceptance & environment emulation tests
        # the script is basically `npm run test:acceptance:docker && npm run test:acceptance:proxy`
        # but with some extra logging and error handling to help debug failures
        run: |
          set +e
          docker compose -f compose.yml -f test/acceptance/compose.yml \
            run --rm --build --pull always --quiet-pull test
          if [ $? -ne 0 ]; then
            echo -e '\n\n====> Dumping DAL logs...\n'
            docker logs fcp-dal-api-fcp-dal-api-1 | jq
            docker compose down --remove-orphans
            exit 1
          fi
          docker compose -f compose.yml -f test/acceptance/compose.yml -f test/acceptance/cdp-mock-check.yml \
            run --rm --quiet-pull test # no need to build or pull again
          if [ $? -ne 0 ]; then
            echo -e '\n\n====> Dumping DAL logs...\n'
            docker logs fcp-dal-api-fcp-dal-api-1 | jq
            docker compose down --remove-orphans
            exit 1
          fi
          docker compose down --remove-orphans
        # TODO: re-enable mTLS tests when startup health check issue is resolved
        #  && npm run test:acceptance:proxy:mtls

      - name: Sonar Cloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
