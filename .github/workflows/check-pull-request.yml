name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup npm
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install and audit
        run: |
          npm audit --omit=dev
          npm ci  --loglevel verbose

      - name: Verify semantic version bump
        run: |
          TARGET_BRANCH_VERSION=$(git show origin/${{ github.base_ref }}:package.json | jq -r '.version')
          PR_BRANCH_VERSION=$(jq -r '.version' package.json)

          if ! npx -y semver -r ">${TARGET_BRANCH_VERSION}" "${PR_BRANCH_VERSION}" > /dev/null  ; then
            echo "ERROR: Branch package.json version (${PR_BRANCH_VERSION}) must be semantically greater than target branch (${TARGET_BRANCH_VERSION})"
            exit 1
          fi

      - name: Lint code
        run: npm run lint

      - name: Download base coverage snapshot from main
        id: base-cov
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p base-coverage
          RUN_ID=$(gh run list --workflow=publish.yml --branch=main --status=success --limit=1 --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" -n coverage-report-main -D base-coverage || true
          fi
          if [ -f base-coverage/report.json ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Jest Coverage Comment (with base snapshot)
        if: steps.base-cov.outputs.available == 'true'
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          test-script: npm test
          base-coverage-file: base-coverage/report.json

      - name: Jest Coverage Comment (no base snapshot)
        if: steps.base-cov.outputs.available != 'true'
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          test-script: npm test

      - name: Acceptance & environment emulation tests
        run: |
          npm run test:acceptance:docker && \
          npm run test:acceptance:proxy
        # TODO: re-enable mTLS tests when startup health check issue is resolved
        #  && npm run test:acceptance:proxy:mtls

      - name: Sonarqube Cloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
