}

input UpdateCustomerAllFieldsInput {
  crn: ID!
  first: String
  last: String
  middle: String
  otherTitle: String
  title: String
  address: AddressInput
  dateOfBirth: Date
  email: EmailInput
  phone: PhoneInput
  doNotContact: Boolean
}

type UpdateCustomerResponse {
  success: Boolean
  customer: Customer
}

