type Query {
  business(sbi: ID!): Business
  businessSearch(
    searchString: String!
    searchType: BusinessSearchFieldType!
    pagination: Pagination
  ): BusinessSearchResponse
  customer(crn: ID!): Customer
  customerSearch(
    searchString: String!
    searchType: CustomerSearchFieldType!
    pagination: Pagination
  ): CustomerSearchResponse
  permissionGroups: [PermissionGroup]
}

type Mutation {
  updateBusinessLegalStatus(input: UpdateBusinessLegalStatusInput!): UpdateBusinessResponse
  updateBusinessDateStartedFarming(
    input: UpdateBusinessDateStartedFarmingInput!
  ): UpdateBusinessResponse
  updateBusinessType(input: UpdateBusinessTypeInput!): UpdateBusinessResponse
  updateBusinessRegistrationNumbers(
    input: UpdateBusinessRegistrationNumbersInput!
  ): UpdateBusinessResponse
  createBusiness(input: CreateBusinessInput!): CreateBusinessResponse
  updateBusinessName(input: UpdateBusinessNameInput!): UpdateBusinessResponse
  updateBusinessEmail(input: UpdateBusinessEmailInput!): UpdateBusinessResponse
  updateBusinessPhone(input: UpdateBusinessPhoneInput!): UpdateBusinessResponse
  updateBusinessAddress(input: UpdateBusinessAddressInput!): UpdateBusinessResponse
  updateBusinessVAT(input: UpdateBusinessVATInput!): UpdateBusinessResponse
  createBusinessCustomerBankDetails(
    input: CreateBusinessCustomerBankDetailsInput!
  ): CreateBusinessCustomerBankDetailsResult
  # eslint-disable-next-line @graphql-eslint/input-name
  updateBusinessLock(input: UpdateBusinessLockUnlockInput!): UpdateBusinessResponse
  # eslint-disable-next-line @graphql-eslint/input-name
  updateBusinessUnlock(input: UpdateBusinessLockUnlockInput!): UpdateBusinessResponse
  updateCustomerAddress(input: UpdateCustomerAddressInput!): UpdateCustomerResponse
  updateCustomerDateOfBirth(input: UpdateCustomerDateOfBirthInput!): UpdateCustomerResponse
  updateCustomerEmail(input: UpdateCustomerEmailInput!): UpdateCustomerResponse
  updateCustomerName(input: UpdateCustomerNameInput!): UpdateCustomerResponse
  updateCustomerPhone(input: UpdateCustomerPhoneInput!): UpdateCustomerResponse
  updateCustomerDoNotContact(input: UpdateCustomerDoNotContactInput!): UpdateCustomerResponse
  updateCustomerAllFields(input: UpdateCustomerAllFieldsInput!): UpdateCustomerResponse
}

input UpdateCustomerAddressInput {
  crn: ID!
  address: AddressInput!
}

input UpdateCustomerDateOfBirthInput {
  crn: ID!
